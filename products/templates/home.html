{% extends "base.html" %}

{% block title %}
E-Commerce Home
{% endblock  %}

{% block content %}
<section class="hero-slider-section">
    <div class="slider-wrapper">
        
        {% for slider in sliders %}
        <div class="slide-item {% if forloop.first %}active{% endif %}" style="background-image: url('{{ slider.image.url }}');">
            <div class="slide-container">
                <div class="slide-content-box">
                    <h2 class="slide-product-title">{{ slider.product.name }}</h2>
                    <div class="slide-product-desc">
                        {{ slider.product.short_description|linebreaks }}
                    </div>
                    <p class="slide-product-price">from <span>${{ slider.product.price }}</span></p>
                    <a href="#" class="slide-buy-btn">Buy Now</a>
                </div>
            </div>
        </div>
        {% endfor %}

        <button class="slider-arrow arrow-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="slider-arrow arrow-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
    const slides = document.querySelectorAll('.slide-item');
    const prevBtn = document.querySelector('.arrow-prev');
    const nextBtn = document.querySelector('.arrow-next');
    let currentIdx = 0;

    if (slides.length === 0) return;

    function changeSlide(newIndex) {
        slides[currentIdx].classList.remove('active');
        currentIdx = (newIndex + slides.length) % slides.length;
        slides[currentIdx].classList.add('active');
    }

    if (nextBtn) nextBtn.addEventListener('click', () => changeSlide(currentIdx + 1));
    if (prevBtn) prevBtn.addEventListener('click', () => changeSlide(currentIdx - 1));
    
    // Optional: Automatic slide rotation interval hook
    setInterval(() => changeSlide(currentIdx + 1), 7000);
});
</script>
{% endblock  %}
